name: Update Player Stats

on:
  schedule:
    # Runs daily at 8 AM ET (12:00 UTC) — well after overnight Fangraphs refresh
    - cron: "0 12 * * *"
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Fetch live stats from Fangraphs
        run: python scripts/fetch_live_stats.py

      - name: Commit updated data (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hitters.json data/pitchers.json data/all_players.json data/search_index.json
          if git diff --staged --quiet; then
            echo "No stat changes today — skipping commit."
          else
            STATS=$(python -c "
          import json
          h = json.load(open('data/hitters.json'))
          p = json.load(open('data/pitchers.json'))
          print(f'{len(h)} hitters, {len(p)} pitchers')
          ")
            git commit -m "chore: update player stats $(date -u +%Y-%m-%d) [${STATS}]"
            echo "Committed stat update."
          fi

      - name: Push to main
        run: git push origin main
